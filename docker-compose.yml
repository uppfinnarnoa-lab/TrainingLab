services:
  postgres:
    image: postgres:16-alpine
    container_name: claudetrainer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: claudetrainer
      POSTGRES_USER: claudetrainer
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudetrainer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
