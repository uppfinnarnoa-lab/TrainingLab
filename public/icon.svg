<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="#1A1D27"/>
  <!-- T crossbar as ECG / pulse line -->
  <polyline
    points="4,16 9,16 13,5 17,25 21,16 36,16"
    stroke="#6EE7B7"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- T vertical stem -->
  <line
    x1="20.5" y1="16"
    x2="20.5" y2="36"
    stroke="#6EE7B7"
    stroke-width="2.5"
    stroke-linecap="round"
  />
</svg>
