<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="#1A1D27"/>

  <!-- Bold T crossbar -->
  <rect x="4" y="9" width="32" height="7" rx="1.5" fill="#6EE7B7"/>

  <!-- Bold T stem — upper part (above pulse cutout) -->
  <rect x="17" y="16" width="6" height="7" fill="#6EE7B7"/>

  <!-- Bold T stem — lower part (below pulse cutout) -->
  <rect x="17" y="29" width="6" height="7" rx="1.5" fill="#6EE7B7"/>

  <!-- Cutout area in stem — background color punches a window -->
  <rect x="17" y="23" width="6" height="6" fill="#1A1D27"/>

  <!-- Pulse line through the cutout window -->
  <polyline
    points="17,26 18.5,24 20,29 21.5,24 23,26"
    stroke="#6EE7B7"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
